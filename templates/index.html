<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Mate</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
     
     
/* Base Page Styling */
body {
  background: radial-gradient(circle at top left, #0d0d0d, #1a1a1a);
  color: #eaeaea;
  font-family: "Poppins", sans-serif;
  padding-bottom: 50px;
}

/* Header */
h1 {
  text-align: center;
  margin-top: 25px;
  color: #ffffff;
  font-weight: 600;
  letter-spacing: 1px;
}

/* Navbar */
.navbar {
  background: linear-gradient(90deg, #121212, #1e1e1e);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
}

.navbar-brand {
  color: #00f0ff !important;
  font-weight: 600;
  text-shadow: 0 0 6px rgba(0, 240, 255, 0.5);
}

.navbar-brand:hover {
  color: #9c4dff !important;
}

.nav-link {
  color: #cccccc !important;
  transition: color 0.3s ease;
}

.nav-link:hover {
  color: #00f0ff !important;
}

/* Form Section */
.container {
  max-width: 750px;
}

form {
  background: #141414;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.05);
}

form label {
  color: #bdbdbd;
  font-weight: 500;
}

form input {
  background: #e9e9e9;
  color: #000000;
  border: none;
  border-radius: 8px;
  padding: 10px;
  transition: all 0.3s ease;
}

form input:focus {
  outline: none;
  box-shadow: 0 0 6px #00f0ff;
}

/* Buttons */
.btn-primary {
  background: linear-gradient(90deg, #00f0ff, #9c4dff);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: 500;
  transition: all 0.3s ease;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 10px #00f0ff;
}

.btn-outline-dark {
  border: 1px solid #444;
  color: #ddd;
  border-radius: 8px;
  transition: all 0.3s ease;
}

.btn-outline-dark:hover {
  background: linear-gradient(90deg, #00f0ff, #9c4dff);
  color: #000;
  border: none;
}

/* Table Styling */
table {
  background: #121212;
  color: #f1f1f1;
  border-radius: 10px;
  overflow: hidden;
}

thead.table-dark {
  background: #181818 !important;
}

th {
  color: #00f0ff;
  font-weight: 600;
}

tr {
  border-bottom: 1px solid #2b2b2b;
}

td {
  background: #1a1a1a;
  color: #ccc;
  vertical-align: middle;
}

tr:hover td {
  background: #222;
  transition: 0.3s ease;
}

/* Footer (Optional aesthetic touch) */
footer {
  text-align: center;
  color: #888;
  font-size: 0.9rem;
  padding: 20px 0;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}
</style>

      
    </style>
  </head>

  <body>
    <h1>Task Mate</h1>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">MyTodo</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/products">Products</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">Search</button>
          </form>
        </div>
      </div>
    </nav>

    <!-- Add Todo Form -->
    <div class="container my-3">
      <h2>Add a Todo</h2>
      <form action="/" method="POST">
        <div class="mb-3">
          <label for="title" class="form-label">Todo Title</label>
          <input
            type="text"
            class="form-control"
            id="title"
            name="title"
            required
          />
        </div>
        <div class="mb-3">
          <label for="desc" class="form-label">Todo Description</label>
          <input
            type="text"
            class="form-control"
            id="desc"
            name="desc"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary">Add Todo</button>
      </form>
    </div>

    <!-- Todo List Table -->
    <div class="container my-3">
      <h2>Your Todos</h2>
      <table class="table table-hover table-striped">
        <thead class="table-dark">
          <tr>
            <th scope="col">S.No</th>
            <th scope="col">Title</th>
            <th scope="col">Description</th>
            <th scope="col">Time</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for todo in allTodo %}
          <tr>
            <th scope="row">{{ loop.index }}</th>
            <td>{{ todo.title }}</td>
            <td>{{ todo.desc }}</td>
            <td>{{ todo.date_created.strftime('%Y-%m-%d %H:%M') }}</td>

            <td>
  <a href="/update/{{ todo.Sno }}" class="btn btn-outline-primary btn-sm mx-1">Update</a>
  <a href="/delete/{{ todo.Sno }}" class="btn btn-outline-danger btn-sm mx-1">Delete</a>
</td>

       


          </tr>
          {% else %}
          <tr>
            <td colspan="4" class="text-center text-muted">
              No todos yet! Add one above 👆
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
